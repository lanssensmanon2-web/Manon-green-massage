<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manon Green Massage</title>
<style>
body{
font-family:Arial,sans-serif;
background:#eaf7ea;
margin:0;
text-align:center;
}
header{
background:#2e8b57;
color:white;
padding:25px;
}
.container{
max-width:500px;
margin:30px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}
input,select{
width:90%;
padding:10px;
margin:10px;
border-radius:8px;
border:1px solid #ccc;
}
button{
background:#2e8b57;
color:white;
border:none;
padding:12px 25px;
border-radius:8px;
font-size:16px;
cursor:pointer;
}
button:hover{
background:#256f46;
}
</style>
</head>
<body>

<header>
<h1>🌿 Manon Green Massage 🌿</h1>
<p>Ontspan. Geniet. Boek jouw massage.</p>
</header>

<div class="container">
<h2>Afspraak boeken</h2>

<input type="text" placeholder="Naam">

<input type="date">

<select>
<option>Kies een massage</option>
<option>Ontspanningsmassage</option>
<option>Rugmassage</option>
<option>Hot Stone Massage</option>
<option>Sportmassage</option>
</select>

<button onclick="alert('✅ Bedankt! Je afspraak is (fictief) geboekt.')">
Boek afspraak
</button>

</div>

</body>
</html>
